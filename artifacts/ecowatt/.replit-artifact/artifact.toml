kind = "web"
previewPath = "/"
title = "EcoWatt Energy Explorer"
version = "1.0.0"
id = "artifacts/ecowatt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26090

[services.development]
run = "pnpm --filter @workspace/ecowatt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecowatt", "run", "build" ]
publicDir = "artifacts/ecowatt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26090"
BASE_PATH = "/"
